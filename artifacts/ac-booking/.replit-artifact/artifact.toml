kind = "web"
previewPath = "/"
title = "CoolCare AC Service"
version = "1.0.0"
id = "artifacts/ac-booking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19255

[services.development]
run = "pnpm --filter @workspace/ac-booking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ac-booking", "run", "build" ]
publicDir = "artifacts/ac-booking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19255"
BASE_PATH = "/"
